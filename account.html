<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        My Account | House of Kagendo
    </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="style.css">

</head>

<body>

    <section class="account-section">

        <div class="container">

            <!-- ACCOUNT HEADER -->

            <div class="account-header">

                <div class="account-avatar">

                    <i class="bi bi-person-circle"></i>

                </div>

                <h1 id="account-name">

                    Welcome

                </h1>

                <p id="account-email">

                    customer@email.com

                </p>

            </div>

            <!-- ACCOUNT CARDS -->

            <div class="row g-4 mt-4">

                <div class="col-lg-4">

                    <div class="account-card">

                        <i class="bi bi-bag"></i>

                        <h4>

                            My Orders

                        </h4>

                        <p>

                            View your order history.

                        </p>

                    </div>

                </div>

                <div class="col-lg-4">

                    <div class="account-card">

                        <i class="bi bi-cart3"></i>

                        <h4>

                            Saved Cart

                        </h4>

                        <p>

                            Continue shopping where you left off.

                        </p>

                    </div>

                </div>

                <div class="col-lg-4">

                    <div class="account-card">

                        <i class="bi bi-geo-alt"></i>

                        <h4>

                            Addresses

                        </h4>

                        <p>

                            Manage your delivery locations.

                        </p>

                    </div>

                </div>

            </div>

            <!-- LOGOUT -->

            <div class="text-center mt-5">

                <button
                    class="logout-btn"
                    onclick="logout()">

                    Logout

                </button>

            </div>

        </div>

    </section>

    <script>

        const user =
        JSON.parse(
            localStorage.getItem("user")
        );

        if(user){

            document.getElementById(
                "account-name"
            ).innerText =
            user.firstName +
            " " +
            user.lastName;

            document.getElementById(
                "account-email"
            ).innerText =
            user.email;

        }

        function logout(){

            localStorage.removeItem(
                "token"
            );

            localStorage.removeItem(
                "user"
            );

            window.location.href =
            "login.html";

        }

    </script>

</body>

</html>
