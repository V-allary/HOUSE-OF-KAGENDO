<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        House of Kagendo | Sign Up
    </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Main CSS -->
    <link rel="stylesheet"
        href="style.css">

</head>

<body>

    <!-- =========================
         SIGNUP SECTION
    ========================= -->

    <section class="auth-section">

        <div class="auth-overlay"></div>

        <div class="container">

            <div class="auth-card">

                <!-- LOGO -->

                <div class="auth-header">

                    <h1 class="auth-logo">

                        House of Kagendo

                    </h1>

                    <p>

                        Create your luxury shopping account

                    </p>

                </div>

                <!-- FORM -->

                <form id="signup-form">

                    <div class="row">

                        <div class="col-md-6">

                            <input
                                type="text"
                                id="firstName"
                                placeholder="First Name"
                                required>

                        </div>

                        <div class="col-md-6">

                            <input
                                type="text"
                                id="lastName"
                                placeholder="Last Name"
                                required>

                        </div>

                    </div>

                    <input
                        type="email"
                        id="email"
                        placeholder="Email Address"
                        required>

                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required>

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm Password"
                        required>

                    <button
                        type="submit"
                        class="auth-btn">

                        Create Account

                    </button>

                </form>

                <!-- LOGIN LINK -->

                <div class="auth-footer">

                    Already have an account?

                    <a href="login.html">

                        Login

                    </a>

                </div>

            </div>

        </div>

    </section>

    <!-- =========================
         JAVASCRIPT
    ========================= -->

    <script>

        document
            .getElementById("signup-form")
            .addEventListener("submit",
                async (e) => {

                    e.preventDefault();

                    const firstName =
                        document.getElementById("firstName").value;

                    const lastName =
                        document.getElementById("lastName").value;

                    const email =
                        document.getElementById("email").value;

                    const password =
                        document.getElementById("password").value;

                    const confirmPassword =
                        document.getElementById("confirmPassword").value;

                    if (password !== confirmPassword) {

                        alert(
                            "Passwords do not match"
                        );

                        return;
                    }

                    try {

                        const response =
                            await fetch(
                                "http://localhost:5000/signup",
                                {

                                    method: "POST",

                                    headers: {

                                        "Content-Type":
                                            "application/json"

                                    },

                                    body: JSON.stringify({

                                        firstName,

                                        lastName,

                                        email,

                                        password

                                    })

                                }
                            );

                        const data =
                            await response.json();

                        alert(
                            data.message
                        );

                        if (response.ok) {

                            window.location.href =
                                "login.html";

                        }

                    } catch (error) {

                        alert(
                            "Server connection failed."
                        );

                    }

                });

    </script>

</body>

</html>
