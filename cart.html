    <script>
    
    function renderCart() {
    
        const cart =
            JSON.parse(localStorage.getItem("cart")) || [];
    
        const cartItems =
            document.getElementById("cart-items");
    
        const cartTotal =
            document.getElementById("cart-total");
    
        const cartGrandTotal =
            document.getElementById("cart-grand-total");
    
        cartItems.innerHTML = "";
    
        let total = 0;
    
        // EMPTY CART
        if (cart.length === 0) {
    
            cartItems.innerHTML = `
    
            <div class="empty-cart text-center p-5">
    
                <h3>Your Cart Is Empty</h3>
    
                <p>
                    Discover our collection.
                </p>
    
                <a href="shop.html"
                    class="btn btn-dark">
    
                    Continue Shopping
    
                </a>
    
            </div>
    
            `;
    
            cartTotal.innerText = "KES 0";
            cartGrandTotal.innerText = "KES 0";
    
            return;
        }
     // DISPLAY PRODUCTS
cart.forEach((item, index) => {

total += Number(item.price) * Number(item.quantity);

cartItems.innerHTML += `

<div class="cart-item">

    <div class="cart-image">

        <img src="${item.image}"
            alt="${item.name}">

    </div>

    <div class="cart-details">

        <h3>${item.name}</h3>

        <p class="cart-price">

            KES ${Number(item.price).toLocaleString()}

        </p>

        <p>

            Size:
            <strong>${item.size || "N/A"}</strong>

        </p>

        <p>

            Color:

            <span
            style="
            display:inline-block;
            width:16px;
            height:16px;
            border-radius:50%;
            background:${item.color || "#ccc"};
            border:1px solid #ccc;
            vertical-align:middle;
            margin-left:5px;
            ">
            </span>

        </p>

        <div class="quantity-box">

            <button onclick="decreaseQuantity(${index})">

                -

            </button>

            <span>

                ${item.quantity}

            </span>

            <button onclick="increaseQuantity(${index})">

                +

            </button>

        </div>

        <button class="remove-btn"
            onclick="removeItem(${index})">

            <i class="bi bi-trash"></i>

            Remove Item

        </button>

    </div>

</div>

`;

});
        cartTotal.innerText =
            "KES " + total.toLocaleString();
    
        cartGrandTotal.innerText =
            "KES " + total.toLocaleString();
    }
    
    
    // REMOVE ITEM
    function removeItem(index) {
    
        let cart =
            JSON.parse(localStorage.getItem("cart")) || [];
    
        cart.splice(index, 1);
    
        localStorage.setItem(
            "cart",
            JSON.stringify(cart)
        );
    
        renderCart();
    }
    
    
    // INCREASE QUANTITY
    function increaseQuantity(index) {
    
        let cart =
            JSON.parse(localStorage.getItem("cart")) || [];
    
        cart[index].quantity++;
    
        localStorage.setItem(
            "cart",
            JSON.stringify(cart)
        );
    
        renderCart();
    }
    
    
    // DECREASE QUANTITY
    function decreaseQuantity(index) {
    
        let cart =
            JSON.parse(localStorage.getItem("cart")) || [];
    
        if (cart[index].quantity > 1) {
    
            cart[index].quantity--;
    
        } else {
    
            cart.splice(index, 1);
        }
    
        localStorage.setItem(
            "cart",
            JSON.stringify(cart)
        );
    
        renderCart();
    }
    
    
    // LOAD CART
    renderCart();
    
    </script>
