<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>House of KA | Product Details</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top luxury-navbar">
    <div class="container">

        <a class="navbar-brand d-flex align-items-center" href="index.html">
            <img src="images/logo.png" class="logo">
            <span class="brand-text">House of KA</span>
        </a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">

            <ul class="navbar-nav mx-auto">
                <li><a class="nav-link" href="index.html">Home</a></li>
                <li><a class="nav-link" href="shop.html">Shop</a></li>
            </ul>

            <div class="nav-icons">
                <i class="bi bi-search"></i>
                <i class="bi bi-heart"></i>

                <a href="cart.html" class="cart-icon">
                    <i class="bi bi-cart3"></i>
                    <span id="cart-count">0</span>
                </a>
            </div>

        </div>
    </div>
</nav>

<!-- PRODUCT DETAILS -->
<section class="product-details-section">
<div class="container">
<div class="row align-items-center">

<!-- LEFT -->
<div class="col-lg-6">
<div class="product-gallery">

<div class="main-image">
<img id="product-image" src="">
</div>

<div class="thumbnail-wrapper" id="thumbnail-wrapper">
<!-- thumbnails will be dynamic later -->
</div>

</div>
</div>

<!-- RIGHT -->
<div class="col-lg-6">

<p class="product-category-text">Luxury Collection</p>

<h1 id="product-name" class="product-title"></h1>

<div class="product-price-box">
<span id="product-price" class="new-price"></span>
</div>

<p id="product-description" class="product-description"></p>

<!-- SIZE -->
<div class="product-option-section">
<h5>Select Size</h5>
<div class="size-wrapper" id="product-sizes"></div>
</div>

<!-- COLOR -->
<div class="product-option-section">
<h5>Select Color</h5>
<div class="color-wrapper" id="product-colors"></div>
</div>

<!-- QUANTITY -->
<div class="product-option-section">
<h5>Quantity</h5>

<div class="quantity-box">
<button id="minus-btn">-</button>
<span id="quantity-number">1</span>
<button id="plus-btn">+</button>
</div>

</div>

<!-- BUTTONS -->
<div class="product-buttons">

<button class="add-cart-btn">
<i class="bi bi-cart3"></i> Add To Cart
</button>

<button class="buy-now-btn">
Buy Now
</button>

</div>

</div>

</div>
</div>
</section>

<!-- FOOTER (UNCHANGED) -->
<footer class="footer">
<div class="container">
<div class="text-center">
©️ 2026 House of KA
</div>
</div>
</footer>

<!-- SCRIPTS -->
<script src="products.js"></script>
<script src="main.js"></script>

<script>

// GET PRODUCT
const params = new URLSearchParams(window.location.search);
const productId = parseInt(params.get("id"));

const product = products.find(p => p.id === productId);

// LOAD PRODUCT
if(product){

document.getElementById("product-image").src = product.image;
document.getElementById("product-name").innerText = product.name;
document.getElementById("product-price").innerText = "KES " + product.price;
document.getElementById("product-description").innerText = product.description;

// COLORS
const colorBox = document.getElementById("product-colors");

product.colors.forEach(color=>{
const el = document.createElement("span");
el.classList.add("color-circle");
el.style.background = color;
colorBox.appendChild(el);
});

// SIZES
const sizeBox = document.getElementById("product-sizes");

product.sizes.forEach(size=>{
const btn = document.createElement("button");
btn.innerText = size;
btn.classList.add("size-btn");
sizeBox.appendChild(btn);
});

}

// QUANTITY
let qty = 1;

document.getElementById("plus-btn").onclick = ()=>{
qty++;
document.getElementById("quantity-number").innerText = qty;
};

document.getElementById("minus-btn").onclick = ()=>{
if(qty > 1){
qty--;
document.getElementById("quantity-number").innerText = qty;
}
};

// ADD TO CART
document.querySelector(".add-cart-btn").onclick = ()=>{

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const existing = cart.find(item => item.id === product.id);

if(existing){
existing.quantity += qty;
}else{
cart.push({...product, quantity: qty});
}

localStorage.setItem("cart", JSON.stringify(cart));

alert("Added to cart!");

};

// BUY NOW
document.querySelector(".buy-now-btn").onclick = ()=>{

localStorage.setItem("cart",
JSON.stringify([{...product, quantity: qty}]));

window.location.href = "checkout.html";

};

</script>

</body>
</html>
