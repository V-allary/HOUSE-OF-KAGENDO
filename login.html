<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        House of KA | Login
    </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Main CSS -->
    <link rel="stylesheet"
        href="style.css">

</head>

<body>

    <!-- =========================
         LOGIN SECTION
    ========================= -->

    <section class="auth-section">

        <div class="auth-overlay"></div>

        <div class="container">

            <div class="auth-card">

                <!-- HEADER -->

                <div class="auth-header">

                    <h1 class="auth-logo">

                        HOUSE OF KA

                    </h1>

                    <p>

                        Welcome Back

                    </p>

                </div>

                <!-- LOGIN FORM -->

                <form id="login-form">

                    <input
                        type="email"
                        id="email"
                        placeholder="Email Address"
                        required>

                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required>

                    <button
                        type="submit"
                        class="auth-btn">

                        Login

                    </button>

                </form>

                <!-- FOOTER -->

                <div class="auth-footer">

                    Don't have an account?

                    <a href="signup.html">

                        Create Account

                    </a>

                </div>

            </div>

        </div>

    </section>

    <!-- LOGIN SCRIPT -->

    <script>

        document
        .getElementById("login-form")
        .addEventListener("submit",
        async(e)=>{

            e.preventDefault();

            const email =
            document.getElementById("email").value;

            const password =
            document.getElementById("password").value;

            try{

                const response =
                await fetch(
                "http://localhost:5000/login",
                {

                    method:"POST",

                    headers:{
                        "Content-Type":
                        "application/json"
                    },

                    body:JSON.stringify({

                        email,
                        password

                    })

                });

                const data =
                await response.json();

                if(response.ok){

                    localStorage.setItem(
                        "token",
                        data.token
                    );

                    localStorage.setItem(
                        "user",
                        JSON.stringify(data.user)
                    );

                    alert(
                        "Login successful!"
                    );

                    window.location.href =
                    "index.html";

                }else{

                    alert(
                        data.message
                    );

                }

            }catch(error){

                alert(
                    "Server connection failed."
                );

            }

        });

    </script>

</body>

</html>
